<script>
// в”Ђв”Ђв”Ђ Config в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const API_URL = 'https://operam-server.onrender.com/api/crear-cliente';

// в”Ђв”Ђв”Ђ Mapa de regГ­menes в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const REGIMENES = {
  'General de Ley Personas Morales':                                   '601',
  'Personas Morales con Fines no Lucrativos':                          '603',
  'Sueldos y Salarios e Ingresos Asimilados a Salarios':               '605',
  'Arrendamiento':                                                      '606',
  'EnajenaciГіn o AdquisiciГіn de Bienes':                               '607',
  'DemГЎs ingresos':                                                     '608',
  'Residentes en el Extranjero sin Establecimiento Permanente':         '610',
  'Ingresos por Dividendos':                                            '611',
  'Personas FГ­sicas con Actividades Empresariales y Profesionales':     '612',
  'Ingresos por intereses':                                             '614',
  'Sin obligaciones fiscales':                                          '616',
  'IncorporaciГіn Fiscal':                                               '621',
  'Actividades AgrГ­colas, Ganaderas, SilvГ­colas y Pesqueras':           '622',
  'Plataformas TecnolГіgicas':                                           '625',
  'RГ©gimen Simplificado de Confianza':                                  '626',
};

// Prioridad: cuando hay mГєltiples regГ­menes en la CSF, se usa el de mayor prioridad
const PRIORIDAD = ['601','603','612','621','626','606','622','607','608','605','614','611','610','616','625'];

function detectarRegimen(texto) {
  const encontrados = [];
  for (const [clave, codigo] of Object.entries(REGIMENES)) {
    if (texto.includes(clave)) encontrados.push({ texto: clave, codigo });
  }
  if (encontrados.length === 0) return { texto: '', codigo: '612' };
  encontrados.sort((a, b) => PRIORIDAD.indexOf(a.codigo) - PRIORIDAD.indexOf(b.codigo));
  return encontrados[0];
}

// в”Ђв”Ђв”Ђ Parser de CSF в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function parsearCSF(texto) {
  const get = (pattern, group = 1) => {
    const m = texto.match(pattern);
    return m ? m[group].trim() : '';
  };

  const esMoral = /Denominaci[oГі]n\/Raz[oГі]n Social/i.test(texto);
  let nombre_s, primer_apellido, segundo_apellido;
  if (esMoral) {
    nombre_s         = get(/Denominaci[oГі]n\/Raz[oГі]n Social\s*:\s*(.+?)(?=\s*R[eГ©]gimen Capital\s*:|\s*Nombre Comercial\s*:|\n|$)/i);
    primer_apellido  = '';
    segundo_apellido = '';
  } else {
    nombre_s         = get(/Nombre\s*\(s\)\s*:\s*([A-ZГЃГ‰ГЌГ“ГљГ‘ ]+?)(?:\n|Primer)/i);
    primer_apellido  = get(/Primer Apellido\s*:\s*([A-ZГЃГ‰ГЌГ“ГљГ‘]+)/i);
    segundo_apellido = get(/Segundo Apellido\s*:\s*([A-ZГЃГ‰ГЌГ“ГљГ‘]+)/i);
  }
  const rfc              = get(/RFC\s*:\s*([A-Z0-9]{12,13})/i);
  const idcif            = get(/idCIF\s*:\s*(\d+)/i);
  const cp               = get(/CГіdigo Postal\s*:?\s*(\d{5})/i);
  const vialidad         = get(/Nombre de Vialidad\s*:\s*([A-ZГЃГ‰ГЌГ“ГљГ‘0-9 ]+?)(?:\n|NГєmero)/i);
  const num_ext          = get(/NГєmero Exterior\s*:\s*([^\n]+?)(?:\n|NГєmero)/i);
  const num_int          = get(/NГєmero Interior\s*:\s*([^\n]*?)(?:\n|Nombre)/i);
  const colonia          = get(/Nombre de la Colonia\s*:\s*([A-ZГЃГ‰ГЌГ“ГљГ‘0-9 ]+?)(?:\n|Nombre)/i);
  const municipio        = get(/Nombre del Municipio[^:]*:\s*([A-ZГЃГ‰ГЌГ“ГљГ‘0-9 ]+?)(?:\n|Nombre)/i);
  const estado           = get(/Nombre de la Entidad Federativa\s*:\s*([A-ZГЃГ‰ГЌГ“ГљГ‘]+)/i);

  // Fecha de emisiГіn (ej: "A 02 DE ENERO DE 2026" o "A 15 DE MARZO DE 2025")
  const MESES = {enero:'01',febrero:'02',marzo:'03',abril:'04',mayo:'05',junio:'06',
                 julio:'07',agosto:'08',septiembre:'09',octubre:'10',noviembre:'11',diciembre:'12'};
  let csf_fecha = '';
  const mFecha = texto.match(/A\s+(\d{1,2})\s+DE\s+([A-ZГЃГ‰ГЌГ“ГљГ‘]+)\s+DE\s+(\d{4})/i);
  if (mFecha) {
    const mes = MESES[mFecha[2].toLowerCase()] || '01';
    csf_fecha = `${mFecha[3]}-${mes}-${mFecha[1].padStart(2,'0')}`;
  }

  // Actividades econГіmicas
  const actividades = [];
  const actRegex = /(\d+)\s+([A-ZГЃГ‰ГЌГ“ГљГ‘][^\n]+?)\s+(\d+)\s+(\d{2}\/\d{2}\/\d{4})/g;
  let mAct;
  while ((mAct = actRegex.exec(texto)) !== null) {
    const desc = mAct[2].trim();
    const pct  = mAct[3];
    if (!actividades.some(a => a.includes(desc))) {
      actividades.push(`${desc} (${pct}%)`);
    }
  }

  // RГ©gimen fiscal principal (el primero que aparezca)
  const { texto: regTexto, codigo: regCodigo } = detectarRegimen(texto);

  const toTC = s => s.toLowerCase().replace(/\b\w/g, l => l.toUpperCase());
  const CustName = [nombre_s, primer_apellido, segundo_apellido].filter(Boolean).join(' ');
  // Persona Moral: cust_ref = razГіn social en Title Case
  // Persona FГ­sica: cust_ref = Nombre + Primer Apellido en Title Case
  const cust_ref = esMoral ? toTC(nombre_s) : toTC(`${nombre_s} ${primer_apellido}`);

  const notes = actividades.length
    ? `Actividades econГіmicas (CSF ${csf_fecha}):\n` + actividades.map(a => `- ${a}`).join('\n')
    : '';

  return {
    CustName, cust_ref,
    nombre_s, primer_apellido, segundo_apellido,
    tax_id:   rfc,
    idcif,
    street:        vialidad,
    street_number: num_ext,
    suite_number:  num_int,
    district:      colonia,
    postal_code:   cp,
    city:          municipio,
    state:         estado,
    country:       'MГ©xico',
    cfdi_regimen_fiscal: regCodigo,
    regimen_text:  regTexto,
    actividades,
    csf_fecha,
    notes,
    phone: '',
    email: '',
  };
}

// в”Ђв”Ђв”Ђ Leer PDF в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function leerPDF(file) {
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const buffer    = await file.arrayBuffer();
  const pdf       = await pdfjsLib.getDocument({ data: buffer }).promise;
  let textoTotal  = '';

  for (let i = 1; i <= Math.min(pdf.numPages, 2); i++) {
    const page    = await pdf.getPage(i);
    const content = await page.getTextContent();
    textoTotal   += content.items.map(item => item.str).join(' ') + '\n';
  }

  return textoTotal;
}

// в”Ђв”Ђв”Ђ Poblar formulario в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function poblarForm(data) {
  const set = (id, val) => { const el = document.getElementById(id); if (el) el.value = val || ''; };
  set('f_CustName',            data.CustName);
  set('f_cust_ref',            data.cust_ref);
  set('f_tax_id',              data.tax_id);
  set('f_idcif',               data.idcif);
  set('f_street',              data.street);
  set('f_street_number',       data.street_number);
  set('f_suite_number',        data.suite_number);
  set('f_district',            data.district);
  set('f_postal_code',         data.postal_code);
  set('f_city',                data.city);
  set('f_state',               data.state);
  set('f_regimen_text',        data.regimen_text);
  set('f_cfdi_regimen_fiscal', data.cfdi_regimen_fiscal);
  set('f_notes',               data.notes);
  set('f_csf_fecha',           data.csf_fecha);
}

// в”Ђв”Ђв”Ђ Leer formulario в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function leerForm() {
  const get = id => document.getElementById(id)?.value?.trim() || '';
  const notasRaw = get('f_notes');
  // Extraer actividades del textarea
  const actividades = notasRaw
    .split('\n')
    .filter(l => l.startsWith('- '))
    .map(l => l.slice(2));

  return {
    nombre_s:          get('f_CustName').split(' ')[0],
    primer_apellido:   get('f_CustName').split(' ')[1] || '',
    segundo_apellido:  get('f_CustName').split(' ').slice(2).join(' '),
    tax_id:            get('f_tax_id'),
    idcif:             get('f_idcif'),
    street:            get('f_street'),
    street_number:     get('f_street_number'),
    suite_number:      get('f_suite_number'),
    district:          get('f_district'),
    postal_code:       get('f_postal_code'),
    city:              get('f_city'),
    state:             get('f_state'),
    country:           'MГ©xico',
    cfdi_regimen_fiscal: get('f_cfdi_regimen_fiscal'),
    actividades,
    csf_fecha:         get('f_csf_fecha'),
    phone:             (() => {
      const code   = document.getElementById('f_phone_code')?.value || '+52';
      const number = get('f_phone_number');
      return number ? `${code} ${number}` : '';
    })(),
    email:             get('f_email'),
    salesman:            get('f_salesman'),
    segmento_id:         get('f_segmento_id'),
    timbrado_uso_cfdi:   get('f_timbrado_uso_cfdi'),
  };
}

// в”Ђв”Ђв”Ђ Mostrar status в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function setStatus(tipo, msg) {
  const el = document.getElementById('status');
  el.className = `status ${tipo}`;
  el.textContent = msg;
}

// в”Ђв”Ђв”Ђ Eventos в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const uploadZone = document.getElementById('uploadZone');
const pdfInput   = document.getElementById('pdfInput');

uploadZone.addEventListener('click', () => pdfInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file?.type === 'application/pdf') procesarPDF(file);
});
pdfInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) procesarPDF(file);
});

async function procesarPDF(file) {
  setStatus('loading', 'вЏі Leyendo PDF...');
  uploadZone.style.display = 'none';
  try {
    const texto = await leerPDF(file);
    const data  = parsearCSF(texto);
    poblarForm(data);
    document.getElementById('formSection').classList.remove('hidden');
    setStatus('', '');
    document.getElementById('status').style.display = 'none';
    if (!data.tax_id) {
      setStatus('error', 'No se pudo extraer el RFC. Verifica los campos manualmente.');
    }
  } catch (err) {
    setStatus('error', `Error al leer el PDF: ${err.message}`);
    uploadZone.style.display = '';
  }
}

async function crearCliente() {
  const datos = leerForm();
  if (!datos.tax_id) {
    setStatus('error', 'El RFC es obligatorio.');
    return;
  }

  const btn = document.getElementById('btnCrear');
  btn.disabled = true;
  btn.textContent = 'вЏі Creando...';
  setStatus('loading', 'Conectando con Operam...');

  try {
    const resp = await fetch(API_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(datos),
    });
    const result = await resp.json();

    if (!resp.ok || result.error) {
      setStatus('error', `Error: ${result.error || 'Error desconocido'}`);
    } else if (result.duplicado) {
      setStatus('warn', `El RFC ${datos.tax_id} ya estГЎ registrado en Operam (${result.nombre}). No se realizГі ningГєn cambio.`);
    } else {
      setStatus('ok', `Cliente creado. ${result.nombre} вЂ” ID: ${result.cliente_id ?? 'вЂ”'}`);
    }
  } catch (err) {
    setStatus('error', `No se pudo conectar con el servidor: ${err.message}`);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Crear cliente en Operam';
  }
}

function resetForm() {
  pdfInput.value = '';
  document.getElementById('formSection').classList.add('hidden');
  document.getElementById('status').style.display = 'none';
  uploadZone.style.display = '';
}
</script>
